name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npx eslint . --ext .ts
            - run: npm run unused-exports || true
            - run: npm audit --audit-level=high || true
            - run: npx jest --coverage --forceExit --detectOpenHandles --testPathIgnorePatterns='e2e/|github-e2e'
            - run: npx jest --no-coverage --forceExit --runInBand e2e/ git_triggers/github-e2e.test.ts
