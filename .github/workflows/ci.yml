name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read
    checks: write
    pull-requests: write

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npm run lint
            - run: npm run unused-exports
            - name: Validation hook (committed copy exists)
              run: test -f .config/validation_hook.ts && echo "✅ validation_hook.ts committed copy present"
            - name: Validation hook (if installed)
              run: |
                  HOOK="$HOME/.config/opencode/validation_hook.ts"
                  if [ -f "$HOOK" ]; then
                    npx tsx "$HOOK" --test
                  else
                    echo "⚠️ validation_hook.ts not found — skipping (only available on dev machines)"
                  fi
            - run: npm audit --audit-level=high
            - name: Check outdated dependencies (warning only)
              run: npm outdated --json || true
            - name: Tests with coverage (Node 22 only)
              if: matrix.node-version == 22
              run: npx vitest run --coverage --testTimeout=120000
            - name: Tests without coverage (Node 24+)
              if: matrix.node-version != 22
              run: npx vitest run --testTimeout=120000
            - name: E2E tests (separate CTRF output to avoid overwriting main suite report)
              run: npx vitest run git_triggers/github-e2e.test.ts
              env:
                  CTRF_OUTPUT_FILE: ctrf-report-e2e.json

            - name: Upload CTRF report for post-processing
              if: matrix.node-version == 22
              uses: actions/upload-artifact@v4
              with:
                  name: ctrf-report
                  path: reports/ctrf-report.json

    post-process:
        if: always()
        needs: test
        uses: ./.github/workflows/qa-post-process.yml
        with:
            project-name: qa_tools
