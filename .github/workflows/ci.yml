name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read
    checks: write
    pull-requests: write

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npm run lint
            - run: npm run unused-exports
            - name: Validation hook (committed copy exists)
              run: test -f .config/validation_hook.ts && echo "✅ validation_hook.ts committed copy present"
            - name: Validation hook (if installed)
              run: |
                  HOOK="$HOME/.config/opencode/validation_hook.ts"
                  if [ -f "$HOOK" ]; then
                    npx tsx "$HOOK" --test
                  else
                    echo "⚠️ validation_hook.ts not found — skipping (only available on dev machines)"
                  fi
            - run: npm audit --audit-level=high
            - name: Check outdated dependencies (warning only)
              run: npm outdated --json || true
            - name: Tests with coverage (Node 22 only)
              if: matrix.node-version == 22
              run: npx vitest run --coverage --testTimeout=120000
            - name: Tests without coverage (Node 24+)
              if: matrix.node-version != 22
              run: npx vitest run --testTimeout=120000
            - run: npx vitest run git_triggers/github-e2e.test.ts
            - name: Post PR report
              if: matrix.node-version == 22
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx tsx scripts/pr-report.ts --no-ai
            - name: Upload HTML report
              if: matrix.node-version == 22
              uses: actions/upload-artifact@v4
              with:
                  name: pr-html-report
                  path: reports/pr-report.html
                  if-no-files-found: ignore
