name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npx eslint . --ext .ts
            - run: npm run unused-exports || true
            - name: Check no .only() in tests
              run: '! grep -rn "\.only(" --include="*.test.ts" --include="*.test.js" .'
            - name: Check no throw string literal
              run: '! grep -rn "throw ''" --include="*.ts" shared/ jira_management/ git_triggers/'
            - run: npm audit --audit-level=high || true
            - run: npx jest --coverage --forceExit --detectOpenHandles --testPathIgnorePatterns='github-e2e'
            - run: npx jest --no-coverage --forceExit --runInBand git_triggers/github-e2e.test.ts
