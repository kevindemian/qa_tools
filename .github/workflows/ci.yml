name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
    schedule:
        - cron: 0 6 * * 1

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    checks: write
    pull-requests: write
    actions: read

jobs:
    quality:
        name: Quality
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: npm
            - name: Reapply immutable bit on audit-suppressions.ts (AGENTS §18)
              run: chattr +i scripts/audit-suppressions.ts || echo "chattr unavailable (non-fatal on this runner)"
            - name: Verify audit-suppressions.ts immutable bit
              run: lsattr scripts/audit-suppressions.ts
            - run: npm ci
            - run: npm run typecheck
            - name: Security vigilant scan
              run: |
                  VIGILANT="npx tsx scripts/rule-vigilant.ts"
                  FAIL=0
                  for f in eslint.config.mjs .dependency-cruiser.js .gitleaks.toml AGENTS.md scripts/quality-check.ts scripts/audit-suppressions.ts; do
                    if [ -f "$f" ]; then
                      COUNT=$($VIGILANT --file "$f" --json | npx tsx -e "import { readFileSync } from 'fs'; const d = JSON.parse(readFileSync(0,'utf-8')); process.stdout.write(String(d.length));")
                      echo "  $f: $COUNT warning(s)"
                      [ "$COUNT" -gt 0 ] && FAIL=1
                    fi
                  done
                  [ "$FAIL" -eq 0 ] || exit 1
            - run: npm run lint
            - run: npm run unused-exports
            - run: npm run depcruise
            - run: npm run type-coverage
            - name: Install gitleaks
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
            - run: npm run gitleaks
            - name: Install osv-scanner
              run: |
                  OSV_VERSION="2.4.0"
                  curl -sSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o /tmp/osv-scanner
                  sudo install -m 755 /tmp/osv-scanner /usr/local/bin/osv-scanner
                  osv-scanner --version
            - run: npm run osv-scan
            - name: Snyk test
              if: env.SNYK_TOKEN != ''
              run: npm run snyk-test
            - name: Check mock chains
              run: npx tsx scripts/check-mock-chains.ts
            - name: Validation hook (committed copy exists)
              run: test -f .config/validation_hook.ts && echo "validation_hook.ts committed copy present"
            - name: Validation hook (if installed)
              run: |
                  HOOK="$HOME/.config/opencode/validation_hook.ts"
                  if [ -f "$HOOK" ]; then
                    npx tsx "$HOOK" --test
                  else
                    echo "validation_hook.ts not found — skipping (only available on dev machines)"
                  fi

    semgrep:
        name: Semgrep (suppression detection)
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0
            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
            - name: Install Semgrep (version pinned in .semgrep/version)
              run: pip install "semgrep==$(cat .semgrep/version)"
            - name: Run Semgrep on diff (turnstile)
              run: npx tsx scripts/run-semgrep.ts --diff

    no-swallow:
        name: No-swallow (catch suppression, diff only)
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: npm
            - run: npm ci
            - name: Run no-swallow detector on diff (turnstile)
              run: npx tsx scripts/run-noswallow.ts

    test:
        name: Test (Node ${{ matrix.node-version }})
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npm audit --audit-level=high
            - name: Check outdated dependencies (warning only)
              run: npm outdated --json || true
            - name: Tests with coverage (Node 22 only)
              if: matrix.node-version == 22
              run: npx vitest run --coverage --testTimeout=120000
            - name: Tests without coverage (Node 24+)
              if: matrix.node.version != 22
              run: npx vitest run --testTimeout=120000
            - name: Upload test report for post-processing
              if: always() && matrix.node-version == 22
              uses: actions/upload-artifact@v7
              with:
                  name: test-report
                  path: reports/
                  if-no-files-found: warn

    post-process:
        if: always() && github.event_name != 'schedule'
        needs: test
        uses: ./.github/workflows/qa-post-process.yml
        with:
            project-name: qa_tools

    mutation:
        name: Mutation Testing (diff-scoped)
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'))
        runs-on: ubuntu-latest
        needs: quality
        timeout-minutes: 15
        permissions:
            contents: read
            pull-requests: write
            checks: write
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 2
            - uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: npm
            - run: npm ci
            - name: Initialize tautest
              run: npx tautest init --yes --runner vitest --no-install
            - name: Run diff-scoped mutation testing
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  EXIT_CODE=0
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    npx tautest run --config tautest.config.json --base ${{ github.base_ref }} --threshold 60 --prompt-style opencode || EXIT_CODE=$?
                  else
                    npx tautest run --config tautest.config.json --base HEAD~1 --threshold 60 --prompt-style opencode || EXIT_CODE=$?
                  fi
                  # Exit code 2 = no production files to mutate (expected for test-only changes)
                  if [ "${EXIT_CODE}" = "2" ]; then
                    echo "No production files changed — skipping mutation testing"
                    exit 0
                  fi
                  exit ${EXIT_CODE}
            - name: Upload mutation report
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: mutation-report
                  path: .tautest/
