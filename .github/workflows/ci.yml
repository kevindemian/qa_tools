name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npx eslint . --ext .ts
            - run: npm run unused-exports
            - name: Verify protected config integrity
              run: |
                  FAIL=0
                  while IFS='|' read -r FILE HASHFILE; do
                    EXPECTED=$(cat ".config/$HASHFILE" 2>/dev/null)
                    CONFIG_PATH="$HOME/.config/opencode/$FILE"
                    if [ -f "$CONFIG_PATH" ] && [ -n "$EXPECTED" ]; then
                      ACTUAL=$(sha256sum "$CONFIG_PATH" | cut -d' ' -f1)
                      if [ "$ACTUAL" != "$EXPECTED" ]; then
                        echo "❌ $FILE hash mismatch"
                        echo "  Expected: $EXPECTED"
                        echo "  Actual:   $ACTUAL"
                        FAIL=1
                      else
                        echo "✅ $FILE integrity verified"
                      fi
                    fi
                  done << 'CHECKEOF'
                    validation_hook.ts|validation-hook.expected-hash
                    AGENTS.md|agents.expected-hash
                    opencode.jsonc|opencode-config.expected-hash
            CHECKEOF
                  exit $FAIL
            - name: Validation hook
              run: npx tsx ~/.config/opencode/validation_hook.ts --test
            - name: Enforce code quality
              run: npx tsx scripts/enforce-quality.ts
            - name: Quality gate (health + coverage + flaky)
              run: npx tsx scripts/quality-gate.ts --json
            - run: npm audit --audit-level=high
            - name: Check outdated dependencies (warning only)
              run: npm outdated --json || true
            - run: npx vitest run --coverage --forceExit --testTimeout=30000
            - run: npx vitest run --forceExit git_triggers/github-e2e.test.ts
