name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npx eslint . --ext .ts
            - run: npm run unused-exports
            - name: Enforce code quality
              run: npx tsx scripts/enforce-quality.ts
            - name: Quality gate (health + coverage + flaky)
              run: npx tsx scripts/quality-gate.ts --json
            - run: npm audit --audit-level=high
            - name: Check outdated dependencies (warning only)
              run: npm outdated --json || true
            - run: npx jest --coverage --forceExit --detectOpenHandles --testPathIgnorePatterns='github-e2e'
            - run: npx jest --no-coverage --forceExit --runInBand git_triggers/github-e2e.test.ts
