name: QA Post-Process

on:
    workflow_call:
        inputs:
            project-name:
                description: Project name for feature config lookup
                required: true
                type: string
            ctrf-path:
                description: Path to CTRF report JSON
                required: false
                default: reports/ctrf-report.json
                type: string

jobs:
    post-process:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
            - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
              with:
                  node-version: 22
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Download CTRF report
              continue-on-error: true
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
              with:
                  name: ctrf-report
                  path: reports/
            - name: Verify CTRF report
              if: always()
              run: ls -la reports/ctrf-report.json
            - name: Run QA Tools Post-Processing
              if: always()
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  CTRF_PATH: ${{ inputs.ctrf-path }}
                  PROJECT_NAME: ${{ inputs.project-name }}
              run: npx tsx shared/pr-report-core.ts --ctrf "$CTRF_PATH" --project "$PROJECT_NAME"
            - name: Upload PR Report HTML
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: pr-report-html
                  path: reports/pr-report.html
                  if-no-files-found: warn
