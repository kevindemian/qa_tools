name: QA Post-Process

on:
    workflow_call:
        inputs:
            project-name:
                description: Project name for feature config lookup
                required: true
                type: string
            ctrf-path:
                description: Path to CTRF report JSON
                required: false
                default: reports/ctrf-report.json
                type: string

jobs:
    post-process:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e1148
            - uses: actions/setup-node@49933ea
              with:
                  node-version: 22
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Download CTRF report
              continue-on-error: true
              uses: actions/download-artifact@d3f86a1
              with:
                  name: ctrf-report
                  path: reports/
            - name: Verify CTRF report
              if: always()
              run: ls -la reports/ctrf-report.json
            - name: Run QA Tools Post-Processing
              if: always()
              run: npx tsx shared/pr-report-core.ts --ctrf ${{ inputs.ctrf-path }} --project ${{ inputs.project-name }}
              env:
                  GITHUB_TOKEN: ${{ github.token }}
            - name: Upload PR Report HTML
              if: always()
              uses: actions/upload-artifact@ea165f8
              with:
                  name: pr-report-html
                  path: reports/pr-report.html
                  if-no-files-found: warn
