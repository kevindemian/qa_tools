# SonarQube project configuration
# Requires: SONAR_TOKEN and SONAR_HOST_URL in CI env

sonar.projectKey=qa_tools
sonar.projectName=QA Tools
sonar.projectVersion=1.0.0
sonar.organization=kevindemian

sonar.sources=shared,jira_management,git_triggers,scripts
sonar.tests=shared,jira_management,git_triggers
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

sonar.exclusions=node_modules/**,coverage/**,dist/**,reports/**,.audit/**,.config/**,.opencode/**,**/*.d.ts

sonar.typescript.lcov.reportPaths=coverage/coverage-final.json
sonar.javascript.lcov.reportPaths=coverage/coverage-final.json

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
